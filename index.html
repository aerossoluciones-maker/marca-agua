<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AEROS SOLUCIONES</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
    margin-bottom:30px;
}

button{
    width:90%;
    max-width:400px;
    padding:20px;
    font-size:22px;
    border:none;
    border-radius:12px;
    margin:10px;
    cursor:pointer;
}

#tomarFoto{
    background:#ff7b00;
    color:white;
}

#galeriaBtn{
    background:#2196F3;
    color:white;
}

#compartir{
    background:#25D366;
    color:white;
    display:none;
}

#nuevaFoto{
    background:#444;
    color:white;
    display:none;
}

#preview{
    width:100%;
    max-width:500px;
    margin-top:20px;
    border-radius:10px;
    display:none;
}

canvas{
    display:none;
}

</style>
</head>
<body>

<h1>AEROS SOLUCIONES</h1>

<button id="tomarFoto">
📷 TOMAR FOTO
</button>

<button id="galeriaBtn">
🖼️ ELEGIR FOTO
</button>

<button id="compartir">
📤 COMPARTIR
</button>

<button id="nuevaFoto">
📷 NUEVA FOTO
</button>

<input
type="file"
id="fotoInput"
accept="image/*"
capture="environment"
hidden>

<input
type="file"
id="galeriaInput"
accept="image/*"
hidden>

<img id="preview">

<canvas id="canvas"></canvas>

<script>

const fotoInput = document.getElementById("fotoInput");
const galeriaInput = document.getElementById("galeriaInput");

const tomarFoto = document.getElementById("tomarFoto");
const galeriaBtn = document.getElementById("galeriaBtn");

const compartir = document.getElementById("compartir");
const nuevaFoto = document.getElementById("nuevaFoto");

const preview = document.getElementById("preview");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let archivoFinal = null;

tomarFoto.addEventListener("click", () => {
    fotoInput.click();
});

galeriaBtn.addEventListener("click", () => {
    galeriaInput.click();
});

fotoInput.addEventListener(
    "change",
    procesarFoto
);

galeriaInput.addEventListener(
    "change",
    procesarFoto
);

async function procesarFoto(event){

    const archivo =
        event.target.files[0];

    if(!archivo) return;

    const foto = new Image();
    const logo = new Image();

    foto.onload = () => {

        logo.onload = () => {

            canvas.width = foto.width;
            canvas.height = foto.height;

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                foto,
                0,
                0,
                foto.width,
                foto.height
            );

            /* Logo al 40% */

            const logoWidth =
                foto.width * 0.40;

            const ratio =
                logo.height / logo.width;

            const logoHeight =
                logoWidth * ratio;

            const margen = 10;

            ctx.drawImage(
                logo,
                foto.width -
                logoWidth -
                margen,
                margen,
                logoWidth,
                logoHeight
            );

            canvas.toBlob((blob)=>{

                archivoFinal = new File(
                    [blob],
                    "AEROS_FOTO.jpg",
                    {
                        type:"image/jpeg"
                    }
                );

                preview.src =
                    URL.createObjectURL(blob);

                preview.style.display =
                    "block";

                compartir.style.display =
                    "inline-block";

                nuevaFoto.style.display =
                    "inline-block";

                tomarFoto.style.display =
                    "none";

                galeriaBtn.style.display =
                    "none";

            },
            "image/jpeg",
            0.80);

        };

        logo.src =
            "1000277928-removebg-preview.png";

    };

    foto.src =
        URL.createObjectURL(archivo);

}

compartir.addEventListener(
    "click",
    async ()=>{

        if(!archivoFinal){

            alert(
                "No hay foto procesada."
            );

            return;
        }

        try{

            await navigator.share({
                files:[archivoFinal],
                title:
                "AEROS SOLUCIONES"
            });

        }catch(error){

            console.log(error);

        }

    }
);

nuevaFoto.addEventListener(
    "click",
    ()=>{

        fotoInput.value = "";
        galeriaInput.value = "";

        archivoFinal = null;

        preview.style.display =
            "none";

        compartir.style.display =
            "none";

        nuevaFoto.style.display =
            "none";

        tomarFoto.style.display =
            "inline-block";

        galeriaBtn.style.display =
            "inline-block";

    }
);

</script>

</body>
</html>

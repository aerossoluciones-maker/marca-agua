<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Marca de Agua</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    text-align:center;
}

input{
    margin:10px;
}

canvas{
    max-width:100%;
    border:1px solid #ccc;
    margin-top:20px;
}

button{
    padding:10px 20px;
    margin:10px;
}
</style>
</head>
<body>

<h2>Generador de Marca de Agua</h2>

<div>
    <input type="file" id="foto" accept="image/*"><br>
    <input type="file" id="marca" accept="image/*"><br>

    <button id="generar">Generar</button>
    <button id="descargar">Descargar</button>
</div>

<canvas id="canvas"></canvas>

<script>

const fotoInput = document.getElementById('foto');
const marcaInput = document.getElementById('marca');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

document.getElementById('generar').addEventListener('click', () => {

    const fotoFile = fotoInput.files[0];
    const marcaFile = marcaInput.files[0];

    if(!fotoFile || !marcaFile){
        alert('Selecciona ambas imágenes');
        return;
    }

    const foto = new Image();
    const marca = new Image();

    foto.onload = () => {

        marca.onload = () => {

            canvas.width = foto.width;
            canvas.height = foto.height;

            ctx.drawImage(foto,0,0);

            const marcaAncho = foto.width * 0.20;

            const proporcion = marca.height / marca.width;

            const marcaAlto = marcaAncho * proporcion;

            const margen = 10;

            ctx.drawImage(
                marca,
                foto.width - marcaAncho - margen,
                margen,
                marcaAncho,
                marcaAlto
            );

        };

        marca.src = URL.createObjectURL(marcaFile);
    };

    foto.src = URL.createObjectURL(fotoFile);

});

document.getElementById('descargar').addEventListener('click', () => {

    const link = document.createElement('a');

    link.download = 'foto_con_marca.png';
    link.href = canvas.toDataURL('image/png');

    link.click();

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Marca de Agua</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    text-align:center;
    background:#f5f5f5;
}

h1{
    font-size:24px;
}

button,
input[type=file]{
    margin:8px;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

canvas{
    margin-top:20px;
    max-width:100%;
    border:1px solid #ccc;
    background:white;
}

#acciones{
    margin-top:15px;
}
</style>
</head>
<body>

<h1>Generador de Marca de Agua</h1>

<div>
    <button id="camaraBtn">📷 Tomar Foto</button>
</div>

<div>
    <input type="file" id="fotoInput" accept="image/*" capture="environment" hidden>
</div>

<div>
    <label><strong>Marca de Agua (PNG)</strong></label><br>
    <input type="file" id="marcaInput" accept="image/png,image/*">
</div>

<div>
    <button id="generarBtn">Generar</button>
</div>

<canvas id="canvas"></canvas>

<div id="acciones">
    <button id="descargarBtn">💾 Descargar</button>
</div>

<script>

const fotoInput = document.getElementById("fotoInput");
const marcaInput = document.getElementById("marcaInput");

const camaraBtn = document.getElementById("camaraBtn");
const generarBtn = document.getElementById("generarBtn");
const descargarBtn = document.getElementById("descargarBtn");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

camaraBtn.addEventListener("click", () => {
    fotoInput.click();
});

generarBtn.addEventListener("click", () => {

    const fotoFile = fotoInput.files[0];
    const marcaFile = marcaInput.files[0];

    if(!fotoFile){
        alert("Seleccione o tome una foto.");
        return;
    }

    if(!marcaFile){
        alert("Seleccione una marca de agua.");
        return;
    }

    const foto = new Image();
    const marca = new Image();

    foto.onload = () => {

        marca.onload = () => {

            canvas.width = foto.width;
            canvas.height = foto.height;

            ctx.clearRect(0,0,canvas.width,canvas.height);

            ctx.drawImage(
                foto,
                0,
                0,
                foto.width,
                foto.height
            );

            // Logo = 20% del ancho de la foto
            const logoWidth = foto.width * 0.20;

            const ratio = marca.height / marca.width;

            const logoHeight = logoWidth * ratio;

            const margen = 20;

            const x = foto.width - logoWidth - margen;
            const y = margen;

            ctx.drawImage(
                marca,
                x,
                y,
                logoWidth,
                logoHeight
            );

        };

        marca.src = URL.createObjectURL(marcaFile);
    };

    foto.src = URL.createObjectURL(fotoFile);

});

descargarBtn.addEventListener("click", () => {

    if(canvas.width === 0){
        alert("Primero genere una imagen.");
        return;
    }

    const enlace = document.createElement("a");

    enlace.download = "foto_con_marca.png";
    enlace.href = canvas.toDataURL("image/png");

    enlace.click();

});

</script>

</body>
</html>

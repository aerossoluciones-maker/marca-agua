<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AEROS - Marca de Agua</title>

<style>

body{
    margin:0;
    padding:20px;
    text-align:center;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

h1{
    margin-bottom:20px;
}

button{
    padding:14px 20px;
    margin:8px;
    font-size:16px;
    cursor:pointer;
}

canvas{
    margin-top:20px;
    max-width:100%;
    border:1px solid #ccc;
    background:white;
}

</style>
</head>
<body>

<h1>AEROS SOLUCIONES</h1>

<button id="camaraBtn">
📷 Tomar Foto
</button>

<input
type="file"
id="fotoInput"
accept="image/*"
capture="environment"
hidden>

<br>

<button id="generarBtn">
⚙ Generar Marca de Agua
</button>

<button id="descargarBtn">
💾 Descargar JPG
</button>

<br>

<canvas id="canvas"></canvas>

<script>

const fotoInput = document.getElementById("fotoInput");
const camaraBtn = document.getElementById("camaraBtn");
const generarBtn = document.getElementById("generarBtn");
const descargarBtn = document.getElementById("descargarBtn");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

camaraBtn.addEventListener("click", () => {
    fotoInput.click();
});

generarBtn.addEventListener("click", () => {

    const fotoFile = fotoInput.files[0];

    if(!fotoFile){
        alert("Primero tome una foto.");
        return;
    }

    const foto = new Image();
    const logo = new Image();

    foto.onload = () => {

        logo.onload = () => {

            canvas.width = foto.width;
            canvas.height = foto.height;

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                foto,
                0,
                0
            );

            // Logo = 30% del ancho

            const logoWidth = foto.width * 0.30;

            const proporcion =
                logo.height / logo.width;

            const logoHeight =
                logoWidth * proporcion;

            const margen = 30;

            const x =
                foto.width -
                logoWidth -
                margen;

            const y = margen;

            ctx.drawImage(
                logo,
                x,
                y,
                logoWidth,
                logoHeight
            );

            alert("Marca aplicada correctamente.");

        };

        logo.src =
        "1000277928-removebg-preview.png";

    };

    foto.src =
    URL.createObjectURL(fotoFile);

});

descargarBtn.addEventListener("click", () => {

    if(canvas.width === 0){
        alert("Primero genere la imagen.");
        return;
    }

    const enlace =
        document.createElement("a");

    enlace.download =
        "AEROS_FOTO.jpg";

    enlace.href =
        canvas.toDataURL(
            "image/jpeg",
            0.80
        );

    enlace.click();

});

</script>

</body>
</html>
